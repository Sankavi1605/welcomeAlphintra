<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Alphintra</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600&family=Outfit:wght@400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="https://pub-fb213824e9ea46ca978d90bf0c95ba46.r2.dev/AlphintraRealLogo-removebg-preview%20(1).png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #050505;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }
    .bg-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
      background: radial-gradient(circle at 20% 30%, rgba(60, 40, 200, 0.4) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(40, 100, 255, 0.3) 0%, transparent 50%);
      pointer-events: none;
    }
    .content-box {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4);
      max-width: 600px;
      width: 90%;
    }
    h1 {
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(6rem, 15vw, 12rem);
      line-height: 1;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #fff, #88aaff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 16px;
    }
    p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-block;
      padding: 16px 40px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    .btn-home:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="content-box">
    <h1>404</h1>
    <h2>Lost in the void</h2>
    <p>The page you are looking for has drifted into deep space. Let's get you back to the main reception.</p>
    <a href="/" class="btn-home">Return Home</a>
  </div>
</body>
</html>
